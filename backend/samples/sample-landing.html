<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sample Growth Landing</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; padding: 40px; background: #f8f9fb; color: #121212; }
      .hero { max-width: 760px; margin: 0 auto; }
      .hero h1 { font-size: 44px; margin-bottom: 16px; }
      .hero p { font-size: 18px; color: #424242; }
      .cta { margin-top: 24px; }
      .cta button { background: #1363df; color: #fff; border: none; border-radius: 10px; padding: 14px 20px; font-size: 16px; }
      .features { max-width: 760px; margin: 40px auto 0; display: grid; gap: 12px; }
      .feature { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    </style>
  </head>
  <body>
    <section class="hero">
      <h1 class="hero-title">Launch campaigns in days, not months</h1>
      <p class="hero-subtitle">Our workflow automation toolkit helps teams ship faster and stay aligned.</p>
      <div class="cta">
        <button class="cta-primary">Start Free Trial</button>
      </div>
    </section>
    <section class="features">
      <div class="feature"><h2>Simple setup</h2><p>Connect your existing stack with no engineering overhead.</p></div>
      <div class="feature"><h2>Insightful analytics</h2><p>Measure user intent and optimize your top-performing pages.</p></div>
    </section>
  </body>
</html>
